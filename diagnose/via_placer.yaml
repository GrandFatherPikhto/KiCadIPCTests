# Имя GND-цепи (обычно "GND")
gnd_net_name: "GND"

# Список компонентов, возле которых ставим via
components:
  - ref: C5
  - ref: C31

# Параметры via
via:
  offset_from: "courtyard"   # теперь можно "center", "edge" или "courtyard"
  offset_mm: 1.0         # расстояние от центра GND-пада до центра via (мм)
  angle_deg: 0           # угол относительно оси X (градусы)
  drill_mm: 0.3          # диаметр сверловки (мм)
  diameter_mm: 0.6       # внешний диаметр via (мм)